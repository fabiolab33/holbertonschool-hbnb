<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HBnB - Place Details">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="icon" href="static/images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>HBnB</h1>
            <nav>
                <a href="places.html" class="login-button">Back to Places</a>
                <button id="logout-button" class="logout-button">Logout</button>
            </nav>
        </div>
    </header>

    <main>
        <div id="place-details" class="place-details">
            <p class="loading">Loading place details...</p>
        </div>

        <section class="reviews-section">
            <h2>Reviews</h2>
            <div id="reviews-container" class="reviews-container">
                <p class="loading">Loading reviews...</p>
            </div>
            <a href="#" id="add-review-link" class="add-review-button hidden">Add a Review</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="static/js/place-details.js"></script>
    <script>
        // Logout handler
        document.getElementById('logout-button')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout?')) {
                document.cookie = 'token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
