<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HBnB - Add Review">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="icon" href="static/images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="static/images/logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <button id="back-button" class="login-button">Back to Place</button>
                <button id="logout-button" class="logout-button">Logout</button>
            </nav>
        </div>
    </header>

    <main>
        <div class="add-review">
            <h1>Add Your Review</h1>
            <p id="place-title" class="text-center mb-2"></p>

            <form id="review-form" class="form">
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <div class="rating-input">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5">★</label>
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4">★</label>
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3">★</label>
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2">★</label>
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment">Your Review</label>
                    <textarea 
                        id="comment" 
                        name="comment" 
                        required 
                        placeholder="Share your experience..."
                        minlength="10"
                    ></textarea>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit">Submit Review</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="static/js/add-review.js"></script>
</body>
</html>
