<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HBnB - Add Review">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="icon" href="static/images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>HBnB</h1>
            <nav>
                <a href="places.html" class="login-button">Back to Places</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h1>Add Your Review</h1>
            
            <div id="message" style="display: none;"></div>
            
            <form id="review-form" class="form">
                <div class="form-group">
                    <label for="rating">Rating (1-5 stars)</label>
                    <div class="rating-input">
                        <input 
                            type="range" 
                            id="rating" 
                            name="rating" 
                            min="1" 
                            max="5" 
                            value="5" 
                            required
                        >
                        <div id="stars-display" class="stars-display">★★★★★</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment">Your Review</label>
                    <textarea 
                        id="comment" 
                        name="comment" 
                        rows="6" 
                        placeholder="Share your experience at this place..."
                        required
                        minlength="10"
                        maxlength="500"
                    ></textarea>
                    <small class="text-muted">Minimum 10 characters, maximum 500 characters</small>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="submit-button">Submit Review</button>
                    <button type="button" id="cancel-button" class="cancel-button">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="static/js/add-review.js"></script>
</body>
</html>
